server {
    listen 80;
    server_name 83.222.10.148;
    client_max_body_size 20M;

    # Логи
    access_log /var/log/nginx/barbercrm-access.log;
    error_log  /var/log/nginx/barbercrm-error.log;

    # ── Frontend (React PWA) ──
    root /var/www/barbercrm/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # PWA: кэш для статики
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        # Service Worker не кэшируем
        location = /sw.js {
            expires off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location = /manifest.json {
            expires off;
            add_header Cache-Control "no-cache";
        }
    }

    # ── Backend API ──
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Django Admin ──
    location /admin/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django Static (css/js для /admin/) ──
    location /static/ {
        alias /var/www/barbercrm/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Media (загруженные файлы) ──
    location /media/ {
        alias /var/www/barbercrm/backend/media/;
        expires 7d;
    }
}
